version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ingestion_metadata_db
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpassword
      POSTGRES_DB: ingestion_metadata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pguser -d ingestion_metadata"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ingestion_backend_api
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=postgresql://pguser:pgpassword@postgres:5432/ingestion_metadata
      - CLICKHOUSE_HOST=emulated # Default to emulated. Change to real IP in production.
      - POWER_AUTOMATE_API_KEY=PA-Secure-Token-12345
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/quarantine:/app/quarantine
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ingestion_frontend_dashboard
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
